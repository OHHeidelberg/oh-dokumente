<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    <div id="status">Starte...</div>
    <div id="debug"></div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQEfBIQh1VyQYGpdgXFleMLqwiyjl7qkH80FKNtml7m1gDeB8hoIVnMKNQr7sxonuHrQeprks3Tott6/pub?gid=0&single=true&output=csv';

        async function test() {
            const status = document.getElementById('status');
            const debug = document.getElementById('debug');
            
            try {
                status.innerText = "Lade Daten...";
                const response = await fetch(csvUrl);
                const text = await response.text();
                
                debug.innerHTML = "Rohdaten erhalten. Erste 100 Zeichen: <br><pre>" + text.substring(0, 100) + "</pre>";
                
                const rows = text.split('\n');
                status.innerText = "Zeilen gefunden: " + rows.length;
                
                debug.innerHTML += "<br>Zeile 2 (Inhalt): " + rows[1];
            } catch (e) {
                status.innerText = "Fehler: " + e.message;
            }
        }
        test();
    </script>
</body>
</html>
